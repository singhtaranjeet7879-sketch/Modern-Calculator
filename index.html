<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mobile Calculator UI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="calculator" aria-label="Calculator">
    <section class="display" aria-live="polite">
      <div class="expression" id="expression">&nbsp;</div>
      <div class="result" id="result">0</div>
    </section>

    <section class="keys">
      <button class="key function" data-action="backspace" aria-label="Backspace">⌫</button>
      <button class="key function" data-action="clear">AC</button>
      <button class="key function" data-action="percent">%</button>
      <button class="key operator" data-value="÷">÷</button>

      <button class="key" data-value="7">7</button>
      <button class="key" data-value="8">8</button>
      <button class="key" data-value="9">9</button>
      <button class="key operator" data-value="×">×</button>

      <button class="key" data-value="4">4</button>
      <button class="key" data-value="5">5</button>
      <button class="key" data-value="6">6</button>
      <button class="key operator" data-value="−">−</button>

      <button class="key" data-value="1">1</button>
      <button class="key" data-value="2">2</button>
      <button class="key" data-value="3">3</button>
      <button class="key operator" data-value="+">+</button>

      <button class="key" data-action="sign">+/-</button>
      <button class="key" data-value="0">0</button>
      <button class="key" data-value=".">.</button>
      <button class="key operator equals" data-action="equal">=</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
